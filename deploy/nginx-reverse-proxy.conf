# Outpost 哨站 —— 用 nginx 反代把域名指到 18080 上的服务端(可选,给已有 nginx 的机器加域名用)
#
# 前提:
#   1) 已用 server-install.sh 装好 outpost(默认 https://127.0.0.1:18080,自签)
#   2) 已给域名申请证书(如 certbot:certbot certonly --webroot -w /var/www/acme -d 你的域名)
#   3) 把 outpost 配置 /etc/outpost/config.toml 改为域名访问后重启:
#        public_url = "https://你的域名"
#        behind_proxy = true
#        trusted_proxies = ["127.0.0.1", "::1"]
#      (如仍想同时用 https://IP:18080 直连,把它加进 extra_origins)
#
# 把下面 server_name / 证书路径改成你的,放到 /etc/nginx/sites-available/ 并软链到 sites-enabled/。

map $http_upgrade $op_conn_upgrade { default upgrade; '' close; }

server {
    listen 80;
    listen [::]:80;
    server_name 你的域名;
    location /.well-known/acme-challenge/ { root /var/www/acme; default_type "text/plain"; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 你的域名;

    ssl_certificate     /etc/letsencrypt/live/你的域名/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/你的域名/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:OPSSL:4m;
    ssl_session_timeout 1d;

    client_max_body_size 128k;

    location / {
        # 反代到本机 18080 的 outpost(它是自签 TLS,故关闭对后端证书校验 —— 本地回环可信)
        proxy_pass https://127.0.0.1:18080;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $op_conn_upgrade;   # WebSocket 实时推送必需
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
